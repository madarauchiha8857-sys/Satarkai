
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK CAFE - Guatemala Swirl Sensation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap');

        :root {
            --bg-color: #FDFBF7;
            --primary-blue: #4285f4;
            --coffee-brown: #6f4e37;
            --coffee-black: #1a1a1a;
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scrollbar-width: none;
            box-sizing: border-box;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--coffee-black);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Background Video --- */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -100;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            opacity: 0.1;
            pointer-events: none;
        }

        /* --- Header --- */
        header {
            background: white;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 500;
        }
        .logo { font-weight: 900; font-size: 24px; color: #000; letter-spacing: -1px; cursor: pointer; }
        header nav { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; display: flex; gap: 20px; }

        /* --- Hero Banner --- */
        .hero-banner {
            background-color: var(--coffee-brown);
            color: white;
            padding: 60px 8%;
            display: flex; align-items: center; justify-content: space-between;
            border-radius: 0 0 50px 50px; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }
        .hero-text { max-width: 55%; z-index: 1; }
        .hero-text h1 { font-size: clamp(28px, 5vw, 50px); font-weight: 900; line-height: 1.1; margin-bottom: 15px; text-transform: uppercase; }
        .hero-text p { font-size: 14px; opacity: 0.9; margin-bottom: 25px; font-weight: 400; }
        .hero-banner img { width: 280px; z-index: 1; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3)); }

        /* --- Category Grid --- */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 40px 10%;
            background: #fff;
        }
        .cat-circle {
            text-align: center;
            border: 2px solid transparent;
            border-radius: 20px; /* Thoda modern rounded look */
            padding: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cat-circle img {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .cat-circle p {
            font-size: 10px; font-weight: bold; margin-top: 8px; text-transform: uppercase;
            letter-spacing: 1px; color: #333;
        }

        /* Active Category Style */
        .cat-active {
            border-color: #ddd;
            background-color: #f9f9f9;
        }

        /* --- Manual Product Slider --- */
        .slider-container {
            width: 100%;
            overflow: hidden;
            margin-top: 40px;
            padding-bottom: 40px;
        }
        .slider-wrapper {
            display: flex;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-slide {
            flex: 0 0 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .product-slide img {
            width: 85%;
            max-width: 250px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }
        .product-slide img:hover { transform: scale(1.05); }

        /* --- Footer --- */
        footer { text-align: center; padding: 60px 10%; border-top: 1px solid rgba(0,0,0,0.05); }
        .footer-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 40px; font-style: italic; margin-bottom: 10px; }
        .footer-est { font-size: 9px; font-weight: 800; letter-spacing: 5px; opacity: 0.4; margin-bottom: 30px; }

        #loader { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }

        /* Music Pill */
        .vol-pill {
            pointer-events: auto; background: white; border: 1px solid #eee;
            border-radius: 99px; height: 40px; width: 40px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.5s; overflow: hidden;
        }
        .vol-pill.expanded { width: 180px; padding: 0 15px; gap: 10px; }

        @media (max-width: 768px) {
            header nav { display: none; }
            .hero-banner { flex-direction: column; text-align: center; padding: 40px 5%; }
            .hero-text { max-width: 100%; margin-bottom: 30px; }
            .hero-banner img { width: 220px; }
            .category-grid { padding: 30px 5%; }
        }
    </style>
</head>
<body>

    <!-- Splash Loader -->
    <div id="loader">
        <video autoplay muted playsinline id="loader-video" class="w-full h-full object-cover">
            <source src="Opening .MP4" type="video/mp4">
        </video>
    </div>

    <!-- BACKGROUND VIDEO -->
    <video autoplay loop muted playsinline id="bg-video">
        <source src="Background.mp4" type="video/mp4">
    </video>

    <!-- Header -->
    <header>
        <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">SK Cafe ☕</div>
        <nav>Shop | Best Sellers | New Launch</nav>
        <div id="volume-pill" class="vol-pill" onclick="toggleVolumePill()">
            <div id="music-toggle" class="flex items-center justify-center">
                <i data-lucide="volume-x" class="w-4 h-4 text-gray-400" id="music-icon"></i>
            </div>
            <div id="slider-box" class="hidden flex-1 items-center">
                <input type="range" min="0" max="1" step="0.01" value="0.5" id="volume-slider" class="w-full accent-coffee-brown h-1">
            </div>
        </div>
    </header>

    <!-- Audio Elements -->
    <audio id="bg-music" loop src="Music.mp3"></audio>
    <audio id="roar-snd"><source src="Roar.mp3" type="audio/mpeg"></audio>

    <main class="relative z-10">
        
        <!-- Hero Section -->
        <section class="hero-banner">
            <div class="hero-text">
                <h1>New Launch:<br>Premium Arabica</h1>
                <p>Medium-bodied coffee with a nutty flavor sourced from volcanic highlands.</p>
                <button onclick="window.location.href='https://wa.me/919834500977?text=Hello SK CAFE, I want to order Premium Arabica.'" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-gray-100 transition-all shadow-lg">Shop Now</button>
            </div>
            <img src="IMG_5046.jpeg" alt="Premium Coffee">
        </section>

        <!-- Category Grid (2x2 Layout) -->
        <div class="category-grid" id="category-grid">
            <div class="cat-circle cat-active" id="cat-1">
                <img src="Coffe.PNG" alt="Instant Coffee">
                <p>INSTANT COFFEE</p>
            </div>
            <div class="cat-circle" id="cat-2">
                <img src="Coffe2.PNG" alt="Cold Brew">
                <p>COLD BREW</p>
            </div>
            <div class="cat-circle" id="cat-3">
                <img src="Coffe3.PNG" alt="Brew Kits">
                <p>BREW KITS</p>
            </div>
            <div class="cat-circle" id="cat-4">
                <img src="Coffe3.PNG" alt="Hot Coffee">
                <p>HOT COFFEE</p>
            </div>
        </div>

        <!-- Product Manual Slider -->
        <section class="slider-container">
            <div class="slider-wrapper" id="product-slider">
                <div class="product-slide">
                    <img src="Coffe.PNG" alt="Product 1">
                </div>
                <div class="product-slide">
                    <img src="Coffe2.PNG" alt="Product 2">
                </div>
                <div class="product-slide">
                    <img src="Coffe3.PNG" alt="Product 3">
                </div>
            </div>
        </section>

        <!-- Aesthetic Quote -->
        <section class="py-20 text-center px-6">
            <h2 class="text-xl font-bold uppercase tracking-[10px] opacity-10">Artisan Roast Tradition</h2>
        </section>

        <footer>
            <div class="footer-logo">SK Cafe</div>
            <div class="footer-est">EST. 2026 • SUPREME ROASTERY</div>
            <div class="flex justify-center gap-10 text-[10px] font-black uppercase tracking-[3px] text-gray-400">
                <a href="tel:919834500977" class="hover:text-black transition-colors">Support</a>
                <a href="#" class="hover:text-black transition-colors">Instagram</a>
            </div>
        </footer>
    </main>

    <script>
        const audio = document.getElementById('bg-music');
        const roar = document.getElementById('roar-snd');
        const musicIcon = document.getElementById('music-icon');
        const volPill = document.getElementById('volume-pill');
        const sliderBox = document.getElementById('slider-box');

        lucide.createIcons();

        // --- Synchronized Slider & Category Logic ---
        let currentSlide = 0;
        const sliderWrapper = document.getElementById('product-slider');
        const categories = [
            document.getElementById('cat-1'),
            document.getElementById('cat-2'),
            document.getElementById('cat-3'),
            document.getElementById('cat-4')
        ];

        function updateSync() {
            // 1. Slider ko move karein
            const offset = -currentSlide * 100;
            sliderWrapper.style.transform = `translateX(${offset}%)`;

            // 2. Categories ko highlight karein
            categories.forEach((cat, index) => {
                if (index === currentSlide) {
                    cat.classList.add('cat-active'); 
                } else {
                    cat.classList.remove('cat-active'); 
                }
            });

            // Special handle for fourth category (using same photo as slide 3)
            if(currentSlide === 2) {
                categories[3].classList.add('cat-active'); 
            }

            // Next slide calculation
            currentSlide++;
            if (currentSlide >= 3) {
                currentSlide = 0; 
            }
        }

        // Har 3 second mein sync check hoga
        setInterval(updateSync, 3000);
        updateSync(); // Pehli baar turant chalane ke liye

        // --- Logo Interaction ---
        document.querySelector('.logo').addEventListener('mouseenter', () => {
            if (roar) { roar.currentTime = 0; roar.volume = 0.4; roar.play().catch(() => {}); }
        });

        // --- Music Controls ---
        function toggleVolumePill() {
            volPill.classList.toggle('expanded');
            sliderBox.classList.toggle('hidden');
            sliderBox.classList.toggle('flex');
            
            if (audio.paused && volPill.classList.contains('expanded')) {
                audio.play();
                musicIcon.setAttribute('data-lucide', 'volume-2');
            }
            lucide.createIcons();
        }

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // --- Loader ---
        window.addEventListener('load', () => {
            const video = document.getElementById('loader-video');
            if(video) video.onended = () => hideLoader();
            setTimeout(hideLoader, 5500); 
        });

        function hideLoader() {
            const loader = document.getElementById('loader');
            if(!loader) return;
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 600);
        }
    </script>
</body>
</html>
