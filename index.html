
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATARK AI | Helpful Safety Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-white: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
            --brand-blue: #0ea5e9;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fdfeff;
            color: #334155;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .mesh-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(at 0% 0%, #e0f2fe 0, transparent 40%),
                radial-gradient(at 100% 0%, #ede9fe 0, transparent 40%),
                radial-gradient(at 50% 100%, #f0fdf4 0, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
        }

        .bubble-user {
            background: #0ea5e9;
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .bubble-ai {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        @keyframes soft-slide {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-enter {
            animation: soft-slide 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body class="selection:bg-sky-100">
    <div class="mesh-bg"></div>
    <div id="root" class="relative"></div>
</body>
</html>
