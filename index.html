
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Cafe - Brewed Awakenings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .transition-all {
            transition: all 0.5s ease-in-out;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeInDown 0.6s ease-out forwards;
        }

        .bg-transition {
            transition: background-color 0.8s ease;
        }

        /* SVG rotation animation for switching */
        .svg-animate {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .svg-hidden {
            transform: scale(0.9) rotate(15deg);
            opacity: 0;
        }
    </style>
</head>
<body id="body-bg" class="bg-[#F2E3CA] bg-transition">

    <div class="min-h-screen flex flex-col items-center justify-between py-12 px-4 relative">
        
        <!-- White floor effect -->
        <div class="absolute bottom-0 left-0 w-full h-1/3 bg-white pointer-events-none" 
             style="clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 100%);">
        </div>

        <!-- Header -->
        <div id="header-container" class="z-10 text-center animate-fade">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-none mb-0">
                NEW<br><span id="coffee-name">ESPRESSO</span>
            </h1>
        </div>

        <!-- Main Product Section -->
        <div class="relative z-10 w-full max-w-lg flex flex-col items-center">
            
            <!-- Navigation -->
            <button onclick="prevCoffee()" class="absolute left-0 top-1/2 -translate-y-1/2 p-2 hover:scale-110 transition-transform z-20">
                <i data-lucide="chevron-left" class="w-12 h-12 stroke-1"></i>
            </button>
            <button onclick="nextCoffee()" class="absolute right-0 top-1/2 -translate-y-1/2 p-2 hover:scale-110 transition-transform z-20">
                <i data-lucide="chevron-right" class="w-12 h-12 stroke-1"></i>
            </button>

            <!-- Coffee Illustration SVG -->
            <div id="svg-container" class="w-64 h-64 md:w-80 md:h-80 relative flex items-center justify-center svg-animate">
                <svg viewBox="0 0 200 200" class="w-full h-full drop-shadow-2xl">
                    <circle cx="100" cy="100" r="85" fill="#FFF9E5" stroke="#4A3728" stroke-width="1.5" />
                    <circle cx="100" cy="100" r="78" fill="none" stroke="#4A3728" stroke-width="0.5" />
                    
                    <!-- Beans -->
                    <g transform="translate(60, 40) rotate(-15)">
                       <ellipse cx="20" cy="15" rx="20" ry="30" fill="#6F4E37" />
                       <path d="M 20 0 Q 25 15 20 30" stroke="#4A3728" fill="none" />
                    </g>
                    <g transform="translate(100, 40) rotate(15)">
                       <ellipse cx="20" cy="15" rx="20" ry="30" fill="#6F4E37" />
                       <path d="M 20 0 Q 15 15 20 30" stroke="#4A3728" fill="none" />
                    </g>

                    <!-- Cup -->
                    <g transform="translate(55, 80)">
                       <ellipse cx="45" cy="55" rx="40" ry="10" fill="#D2B48C" stroke="#4A3728" />
                       <path id="cup-body" d="M 15 10 Q 15 50 45 50 Q 75 50 75 10 Z" fill="#FFFFFF" stroke="#4A3728" stroke-width="2" />
                       
                       <!-- Steam -->
                       <path d="M 35 0 Q 40 -10 35 -20" stroke="#4A3728" fill="none" opacity="0.4" class="animate-pulse" />
                       <path d="M 55 0 Q 60 -10 55 -20" stroke="#4A3728" fill="none" opacity="0.4" class="animate-pulse" />
                       
                       <ellipse id="liquid-color" cx="45" cy="10" rx="30" ry="8" fill="#4A3728" />
                    </g>

                    <path d="M 20 120 Q 50 110 80 120 M 120 120 Q 150 110 180 120" stroke="#4A3728" fill="none" stroke-width="2" />
                </svg>
            </div>

            <!-- Branding -->
            <div id="branding-container" class="text-center mt-4 transition-all duration-300">
                <h2 class="text-5xl md:text-6xl font-serif tracking-widest text-[#4A3728] font-bold">
                    SK CAFE
                </h2>
                <p id="tagline" class="text-sm md:text-base tracking-[0.4em] text-[#4A3728] mt-2 font-medium uppercase">
                    Brewed Awakenings
                </p>
                
                <div class="mt-6 flex justify-center">
                    <div class="border-2 border-[#4A3728] rounded-full w-12 h-12 flex items-center justify-center relative bg-white/50">
                       <span class="text-xl font-serif font-bold">S</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Order Button -->
        <div class="z-10 mt-8 mb-4">
            <button id="order-btn" onclick="placeOrder()" 
                class="px-12 py-4 rounded-full border-2 border-black text-xl font-medium tracking-wide transition-all duration-300 transform active:scale-95 shadow-lg bg-transparent hover:bg-black hover:text-white">
                ORDER NOW
            </button>
        </div>

        <!-- Pedestal shadow -->
        <div class="absolute bottom-[-20px] w-[120%] h-32 bg-gray-100 rounded-[100%] blur-xl opacity-20 pointer-events-none"></div>
    </div>

    <script>
        // Coffee data
        const coffeeTypes = [
            {
                name: "ESPRESSO",
                tagline: "Brewed Awakenings",
                cupColor: "#FFFFFF",
                liquidColor: "#4A3728",
                bgColor: "#F2E3CA"
            },
            {
                name: "LATTE",
                tagline: "Creamy Delights",
                cupColor: "#FDF5E6",
                liquidColor: "#C68E17",
                bgColor: "#EAD7BB"
            },
            {
                name: "CAPPUCCINO",
                tagline: "Frothy Goodness",
                cupColor: "#FFFFFF",
                liquidColor: "#8B4513",
                bgColor: "#D9C5B2"
            },
            {
                name: "MOCHA",
                tagline: "Chocolate Fusion",
                cupColor: "#EADDCA",
                liquidColor: "#3D2B1F",
                bgColor: "#CCBBAA"
            }
        ];

        let currentIndex = 0;

        // Initialize Icons
        lucide.createIcons();

        function updateUI() {
            const coffee = coffeeTypes[currentIndex];
            const svgCont = document.getElementById('svg-container');
            const branding = document.getElementById('branding-container');
            const header = document.getElementById('header-container');

            // Add exit animations
            svgCont.classList.add('svg-hidden');
            branding.style.opacity = '0';
            branding.style.transform = 'translateY(10px)';
            header.style.opacity = '0';

            setTimeout(() => {
                // Update text and colors
                document.getElementById('body-bg').style.backgroundColor = coffee.bgColor;
                document.getElementById('coffee-name').innerText = coffee.name;
                document.getElementById('tagline').innerText = coffee.tagline;
                document.getElementById('cup-body').setAttribute('fill', coffee.cupColor);
                document.getElementById('liquid-color').setAttribute('fill', coffee.liquidColor);
                document.getElementById('order-btn').innerText = `ORDER ${coffee.name}`;

                // Remove exit animations and trigger entry
                svgCont.classList.remove('svg-hidden');
                branding.style.opacity = '1';
                branding.style.transform = 'translateY(0)';
                header.style.opacity = '1';
            }, 300);
        }

        function nextCoffee() {
            currentIndex = (currentIndex + 1) % coffeeTypes.length;
            updateUI();
        }

        function prevCoffee() {
            currentIndex = (currentIndex - 1 + coffeeTypes.length) % coffeeTypes.length;
            updateUI();
        }

        function placeOrder() {
            const btn = document.getElementById('order-btn');
            const originalText = btn.innerText;
            
            btn.innerText = "ADDED TO CART!";
            btn.classList.add('bg-green-100', 'border-green-600', 'text-green-700');
            btn.classList.remove('hover:bg-black', 'hover:text-white');

            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-green-100', 'border-green-600', 'text-green-700');
                btn.classList.add('hover:bg-black', 'hover:text-white');
            }, 3000);
        }

        // Initialize the first button text
        document.getElementById('order-btn').innerText = `ORDER ${coffeeTypes[0].name}`;
    </script>
</body>
</html>
